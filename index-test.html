<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archiwum Projekt27</title>
    <link rel="icon" type="image/avif" href="https://raw.githubusercontent.com/emmunio/projekt27.pl/refs/heads/main/mentz.avif">
    <script src="https://cdn.jsdelivr.net/npm/replaywebpage@2.1.0/ui.js"></script>

    <style>
        /* --- RESET I BAZA --- */
        body { 
            margin: 0; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #eee;
            overflow: hidden;
        }
        
        /* --- EKRAN POWITALNY --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s ease;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        #welcome-screen h1 { 
            margin-bottom: 30px; 
            font-weight: 300; 
            letter-spacing: 1px; 
            text-align: center; 
        }
        
        .welcome-buttons { 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 800px;
        }
        
        .big-btn {
            padding: 15px 30px;
            font-size: 16px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            flex-grow: 1;
            text-align: center;
        }
        .big-btn:hover { background: #0056b3; transform: scale(1.03); }

        /* Stylizacja przycisków i sekcji KOMPRESJA */
        .kompresja-btn {
            background: #b92b27;
        }
        .kompresja-btn:hover {
            background: #8e211e;
        }
        .kompresja-btn.active {
            background: #b92b27;
            border-color: #ff4b47;
            box-shadow: 0 0 10px rgba(185, 43, 39, 0.6);
        }

        /* Informacja o kompresji */
        .info-kompresja {
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #bbb;
            margin: 5px 0 15px 0;
            padding: 0 10px;
            line-height: 1.5;
        }
        .info-kompresja strong {
            color: #fff;
        }

        /* --- GŁÓWNY INTERFEJS --- */
        #main-interface {
            display: none; 
            flex-direction: column;
            height: 100vh;
            width: 100%;
            animation: fadeIn 1s forwards;
        }

        .controls { 
            background: #1a1a1a; 
            padding: 10px 15px; 
            display: flex; 
            gap: 10px; 
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 100;
            overflow-x: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .controls::-webkit-scrollbar { height: 6px; }
        .controls::-webkit-scrollbar-track { background: #1a1a1a; }
        .controls::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

        .nav-btn {
            padding: 8px 16px;
            cursor: pointer;
            background: #333;
            color: #ddd;
            border: 1px solid #444;
            border-radius: 5px;
            transition: all 0.2s ease;
            font-size: 14px;
            flex-shrink: 0;
        }

        .nav-btn:hover { background: #444; color: white; }
        .nav-btn.active { background: #007bff; color: white; border-color: #0056b3; box-shadow: 0 0 8px rgba(0,123,255,0.5); }

        .separator {
            width: 2px;
            height: 30px;
            background: #444;
            margin: 0 5px;
            flex-shrink: 0;
            border-radius: 2px;
        }

        .welcome-separator {
            width: 100%;
            height: 2px;
            background: #333;
            margin: 15px 0 5px 0; /* Zmodyfikowany margines, by zrobić miejsce na tekst */
        }

        replay-web-page { 
            flex-grow: 1; 
            display: block; 
            width: 100%; 
            border: none;
            min-height: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- MEDIA QUERIES (RWD dla telefonów) --- */
        @media (max-width: 768px) {
            #welcome-screen h1 { font-size: 22px; }
            
            .big-btn {
                width: 100%;
                padding: 12px;
                font-size: 14px;
            }

            .info-kompresja {
                font-size: 12px;
            }

            .controls { padding: 8px 10px; }
            .nav-btn { font-size: 13px; padding: 6px 12px; }
            .separator { height: 24px; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>Wybierz wersję archiwum:</h1>
        <div class="welcome-buttons">
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_.02.-%200-%C5%9Br_1857.wacz', 'btn-1857')">
                Wersja z 4.02.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_.02.-%201-%C5%9Br_2208.wacz', 'btn-2208')">
                Wersja z 11.02.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_1.02-.%20-so_2328.wacz', 'btn-2328')">
                Wersja z 21.02.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_7.03-.%20-so_2307.wacz', 'btn-2307')">
                Wersja z 7.03.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_%2015.-dz-ni_1024_22450.wacz', 'btn-22450')">
                Wersja z 15.03.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_1.03-.%20-so_2247.wacz', 'btn-2247')">
                Wersja z 21.03.2026
            </button>
            <button class="big-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_0.03-.%20-po_1718.wacz', 'btn-1718')">
                Wersja z 30.03.2026
            </button>
            
            <div class="welcome-separator"></div>

            <p class="info-kompresja">
                💡 Na danych komórkowych zalecamy używać sekcji <strong>KOMPRESJA</strong>. Waży ona między 90 a 100 MB (zwykła wersja ponad 250 MB). Wynika to z faktu, że ta wersja ma skompresowane zdjęcia przy pomocy formatu AVIF 65.
            </p>

            <button class="big-btn kompresja-btn" onclick="initializePlayer('https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_0.03po_1718_AVIF65.wacz', 'btn-1718kompresja')">
                Wersja z 30.03.2026 KOMPRESJA
            </button>
        </div>
    </div>

    <div id="main-interface">
        <div class="controls">
            <button id="btn-1857" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_.02.-%200-%C5%9Br_1857.wacz')">
                4.02.2026
            </button>
            <button id="btn-2208" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_.02.-%201-%C5%9Br_2208.wacz')">
                11.02.2026
            </button>
            <button id="btn-2328" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_1.02-.%20-so_2328.wacz')">
                21.02.2026
            </button>
            <button id="btn-2307" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_7.03-.%20-so_2307.wacz')">
                7.03.2026
            </button>
            <button id="btn-22450" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_%2015.-dz-ni_1024_22450.wacz')">
                15.03.2026
            </button>
            <button id="btn-2247" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_1.03-.%20-so_2247.wacz')">
                21.03.2026
            </button>
            <button id="btn-1718" class="nav-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_0.03-.%20-po_1718.wacz')">
                30.03.2026
            </button>
            
            <div class="separator"></div>

            <button id="btn-1718kompresja" class="nav-btn kompresja-btn" onclick="changeSource(this, 'https://media.githubusercontent.com/media/emmunio/projekt27.pl/refs/heads/main/projekt27_0.03po_1718_AVIF65.wacz')">
                30.03.2026 KOMPRESJA
            </button>
        </div>

        <replay-web-page 
            id="player"
            source=""
            url=""
            replay-self-hosted="https://cdn.jsdelivr.net/npm/replaywebpage@2.1.0/"
            deep-link="true">
        </replay-web-page>
    </div>

    <script>
        const targetUrl = 'https://projekt27.pl/';

        function initializePlayer(waczUrl, activeBtnId) {
            const welcomeScreen = document.getElementById('welcome-screen');
            const mainInterface = document.getElementById('main-interface');
            const player = document.getElementById('player');
            
            welcomeScreen.style.opacity = '0';
            setTimeout(() => { welcomeScreen.style.display = 'none'; }, 500);

            mainInterface.style.display = 'flex';

            player.setAttribute('source', waczUrl);
            player.setAttribute('url', targetUrl); 

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            const targetBtn = document.getElementById(activeBtnId);
            targetBtn.classList.add('active');
            
            targetBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function changeSource(btn, waczUrl) {
            const player = document.getElementById('player');
            
            player.setAttribute('source', waczUrl);
            player.setAttribute('url', targetUrl);

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    </script>

</body>
</html>
